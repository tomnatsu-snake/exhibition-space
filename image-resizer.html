<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寸法の間 — 画像リサイズツール</title>
<style>
  :root {
    --bg:#16181d; --surface:#1e2128; --surface-2:#262a33; --line:#343945;
    --text:#e7e9ee; --text-dim:#9aa0ad; --accent:#7fb4a2; --accent-dim:#4d7568;
    --danger:#c98484; --radius:10px;
    --mono:"SFMono-Regular","Consolas","Menlo",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
    min-height:100vh;padding:32px 20px 64px;line-height:1.6;
  }
  .wrap{max-width:960px;margin:0 auto}
  header{margin-bottom:24px}
  h1{font-size:20px;font-weight:600;letter-spacing:.12em}
  h1 .sub{font-size:12px;color:var(--text-dim);font-weight:400;margin-left:12px;letter-spacing:.06em}
  .privacy-note{font-size:12px;color:var(--text-dim);margin-top:6px}
  .privacy-note::before{content:"●";color:var(--accent);font-size:8px;margin-right:6px;vertical-align:2px}

  #dropzone{
    border:1.5px dashed var(--line);border-radius:var(--radius);
    background:var(--surface);padding:44px 20px;text-align:center;
    cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:20px;
  }
  #dropzone:hover,#dropzone.dragover{border-color:var(--accent);background:var(--surface-2)}
  #dropzone .dz-main{font-size:15px}
  #dropzone .dz-hint{font-size:12px;color:var(--text-dim);margin-top:6px}
  #fileInput{display:none}

  .settings{
    display:none;
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:20px;margin-bottom:20px;
  }
  .settings.open{display:block}
  .row{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end}
  .row+.row{margin-top:16px}
  .field{flex:1;min-width:140px}
  .field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:8px;letter-spacing:.05em}
  .field .value{color:var(--accent);font-family:var(--mono);margin-left:8px}
  .field-note{font-size:11px;color:var(--text-dim);margin-top:6px}
  input[type=number],select{
    width:100%;background:var(--surface-2);color:var(--text);
    border:1px solid var(--line);border-radius:6px;
    padding:8px 10px;font-size:14px;font-family:inherit;
  }
  input[type=range]{width:100%;accent-color:var(--accent)}
  input[type=color]{
    width:40px;height:36px;border:1px solid var(--line);border-radius:6px;
    background:var(--surface-2);cursor:pointer;padding:2px;
  }
  input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
  input:focus,select:focus{outline:2px solid var(--accent-dim);outline-offset:1px}

  .dim-row{display:flex;align-items:center;gap:10px}
  .dim-row .x{color:var(--text-dim);font-size:14px}
  .dim-row input[type=number]{width:100px}
  .lock-btn{
    width:36px;height:36px;border-radius:6px;
    border:1px solid var(--line);background:var(--surface-2);
    color:var(--accent);cursor:pointer;font-size:16px;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s;flex-shrink:0;
  }
  .lock-btn:hover{background:var(--surface)}
  .lock-btn.unlocked{color:var(--text-dim)}

  .presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .preset{
    background:var(--surface-2);border:1px solid var(--line);
    border-radius:4px;padding:4px 10px;font-size:11px;color:var(--text-dim);
    cursor:pointer;font-family:var(--mono);transition:border-color .15s;
  }
  .preset:hover{border-color:var(--accent);color:var(--text)}

  .crop-badge{
    display:inline-block;font-size:11px;color:var(--accent);
    border:1px solid var(--accent-dim);border-radius:4px;
    padding:2px 8px;font-family:var(--mono);
  }
  .checkbox-label{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer}

  .divider{border:none;border-top:1px solid var(--line);margin:16px 0}

  #stage,#cropStage{display:none}
  #stage.open,#cropStage.open{display:block}

  .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px}
  .toolbar .info{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
  .spacer{flex:1}

  .btn{
    background:var(--accent-dim);color:var(--text);
    border:none;border-radius:6px;padding:8px 16px;
    font-size:13px;font-family:inherit;cursor:pointer;
    transition:background .15s;
  }
  .btn:hover{background:var(--accent);color:#12211c}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .btn.primary{background:var(--accent);color:#12211c;font-weight:600}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text-dim)}
  .btn.ghost:hover{color:var(--text);border-color:var(--text-dim);background:transparent}
  .btn.ghost.danger:hover{color:var(--danger);border-color:var(--danger)}
  .btn.small{padding:4px 10px;font-size:11px}
  .btn:disabled{opacity:.35;cursor:default}

  .checker{
    overflow:auto;max-height:70vh;border-radius:6px;
    background:repeating-conic-gradient(#3a3f4b 0% 25%,#2b2f3a 0% 50%) 0 0/20px 20px;
    display:flex;justify-content:center;align-items:center;
    border:1px solid var(--line);
  }
  #previewCanvas{display:block;max-width:100%;height:auto}
  #cropCanvas{display:block;max-width:100%;height:auto;touch-action:none;cursor:crosshair}

  .stage-foot{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:12px}
  .crop-instruction{
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;
    font-size:14px;
  }
  .crop-instruction .checkbox-label{margin-top:10px;color:var(--text)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>寸法の間<span class="sub">image resizer</span></h1>
    <p class="privacy-note">処理はすべてこのブラウザ内で完結します。画像はどこにも送信されません。</p>
  </header>

  <div id="dropzone" role="button" tabindex="0" aria-label="画像を選択またはドロップ">
    <div class="dz-main">ここに画像をドロップ、またはクリックして選択</div>
    <div class="dz-hint">1枚ずつ ・ JPEG / PNG / WebP など ・ Ctrl+V でも OK</div>
  </div>
  <input type="file" id="fileInput" accept="image/*">

  <!-- ========= クロップ編集モード ========= -->
  <div id="cropStage">
    <div class="crop-instruction">
      🔍 <strong>切り抜き範囲をドラッグ（指なぞり）で選択してね</strong>
      <label class="checkbox-label">
        <input type="checkbox" id="cropAspectLock" checked>
        選択枠を出力サイズの縦横比（<span id="cropRatioText">?</span>）に固定する
      </label>
    </div>
    <div class="checker"><canvas id="cropCanvas"></canvas></div>
    <div class="stage-foot">
      <button class="btn ghost" id="cropClearBtn">選択をやり直す</button>
      <span class="spacer"></span>
      <span class="info" id="cropInfo"></span>
      <button class="btn ghost" id="cropCancelBtn">キャンセル</button>
      <button class="btn primary" id="cropConfirmBtn" disabled>この範囲で決定</button>
    </div>
  </div>

  <!-- ========= 設定 ========= -->
  <div class="settings" id="settings">
    <div class="row">
      <div class="field" style="flex:0 0 auto">
        <label>出力サイズ (px)</label>
        <div class="dim-row">
          <input type="number" id="outW" min="1" max="16000" placeholder="幅">
          <span class="x">×</span>
          <input type="number" id="outH" min="1" max="16000" placeholder="高さ">
          <button class="lock-btn" id="lockBtn" title="縦横比ロック">🔗</button>
        </div>
        <div class="presets" id="presets">
          <span class="preset" data-w="1920" data-h="1080">1920×1080</span>
          <span class="preset" data-w="1080" data-h="1080">1080×1080</span>
          <span class="preset" data-w="1080" data-h="1350">1080×1350</span>
          <span class="preset" data-w="800" data-h="800">800×800</span>
          <span class="preset" data-w="512" data-h="512">512×512</span>
          <span class="preset" data-w="256" data-h="256">256×256</span>
        </div>
      </div>
    </div>

    <hr class="divider">

    <div class="row">
      <div class="field" style="flex:0 0 auto">
        <label>切り抜き（一部を拡大したいとき）</label>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <button class="btn ghost" id="cropOpenBtn">範囲を選んで拡大</button>
          <span class="crop-badge" id="cropBadge" style="display:none"></span>
          <button class="btn ghost small" id="cropRemoveBtn" style="display:none">解除して全体に戻す</button>
        </div>
      </div>
    </div>

    <hr class="divider">

    <div class="row">
      <div class="field">
        <label for="fitMode">フィットモード</label>
        <select id="fitMode">
          <option value="contain">収める（余白が出る）</option>
          <option value="cover">はみ出しなしで埋める</option>
          <option value="stretch">自由に引き伸ばす</option>
        </select>
        <div class="field-note">「収める」→余白部分の埋め方を選べる</div>
      </div>
      <div class="field" id="fillModeField">
        <label for="fillMode">余白の埋め方</label>
        <select id="fillMode">
          <option value="color">単色で塗る</option>
          <option value="mirror">ふちを反射して埋める</option>
          <option value="blur">ぼかし拡張で埋める</option>
        </select>
      </div>
      <div class="field" id="colorField">
        <label>塗りつぶし色</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="color" id="fillColor" value="#ffffff">
          <span style="font-size:12px;color:var(--text-dim);font-family:var(--mono)" id="fillColorHex">#ffffff</span>
          <button class="btn ghost small" id="pickEdge" title="画像の端の色を自動で拾う">端の色を拾う</button>
        </div>
      </div>
    </div>

    <hr class="divider">

    <div class="row">
      <div class="field" style="max-width:200px">
        <label for="outFormat">出力形式</label>
        <select id="outFormat">
          <option value="image/png">PNG</option>
          <option value="image/jpeg">JPEG</option>
          <option value="image/webp">WebP</option>
        </select>
      </div>
      <div class="field" style="max-width:200px" id="jpegQualField">
        <label for="jpegQual">JPEG / WebP 品質<span class="value" id="jpegQualVal">0.9</span></label>
        <input type="range" id="jpegQual" min="0.1" max="1" step="0.05" value="0.9">
      </div>
    </div>
  </div>

  <!-- ========= プレビュー ========= -->
  <div id="stage">
    <div class="toolbar">
      <span class="info" id="infoText"></span>
      <span class="spacer"></span>
    </div>
    <div class="checker"><canvas id="previewCanvas"></canvas></div>
    <div class="stage-foot">
      <button class="btn ghost danger" id="closeBtn">画像を閉じる</button>
      <span class="spacer"></span>
      <button class="btn" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const dropzone=$('dropzone'), fileInput=$('fileInput');
  const outW=$('outW'), outH=$('outH'), lockBtn=$('lockBtn');
  const fitMode=$('fitMode'), fillMode=$('fillMode');
  const fillColor=$('fillColor'), fillColorHex=$('fillColorHex');
  const pickEdge=$('pickEdge'), colorField=$('colorField'), fillModeField=$('fillModeField');
  const outFormat=$('outFormat'), jpegQual=$('jpegQual');
  const jpegQualVal=$('jpegQualVal'), jpegQualField=$('jpegQualField');
  const saveBtn=$('saveBtn'), closeBtn=$('closeBtn');
  const settings=$('settings'), stage=$('stage');
  const previewCanvas=$('previewCanvas'), infoText=$('infoText');
  const pCtx=previewCanvas.getContext('2d');

  // クロップ関連
  const cropStage=$('cropStage'), cropCanvas=$('cropCanvas');
  const cCtx=cropCanvas.getContext('2d');
  const cropOpenBtn=$('cropOpenBtn'), cropBadge=$('cropBadge'), cropRemoveBtn=$('cropRemoveBtn');
  const cropAspectLock=$('cropAspectLock'), cropRatioText=$('cropRatioText');
  const cropClearBtn=$('cropClearBtn'), cropCancelBtn=$('cropCancelBtn'), cropConfirmBtn=$('cropConfirmBtn');
  const cropInfo=$('cropInfo');

  let srcImg=null, srcUrl=null, locked=true, aspect=1, fileName='image';
  let crop=null;        // {x,y,w,h} 元画像座標 / null=全体
  let dragStart=null, dragSel=null;

  /* ---- 入力 ---- */
  dropzone.addEventListener('click',()=>fileInput.click());
  dropzone.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();fileInput.click()}});
  fileInput.addEventListener('change',()=>{if(fileInput.files[0])loadFile(fileInput.files[0]);fileInput.value='';});
  ['dragover','dragenter'].forEach(ev=>dropzone.addEventListener(ev,e=>{e.preventDefault();dropzone.classList.add('dragover')}));
  ['dragleave','drop'].forEach(ev=>dropzone.addEventListener(ev,e=>{e.preventDefault();dropzone.classList.remove('dragover')}));
  dropzone.addEventListener('drop',e=>{const f=[...e.dataTransfer.files].find(f=>f.type.startsWith('image/'));if(f)loadFile(f)});
  window.addEventListener('dragover',e=>e.preventDefault());
  window.addEventListener('drop',e=>e.preventDefault());
  window.addEventListener('paste',e=>{const it=[...(e.clipboardData?.items||[])].find(i=>i.type.startsWith('image/'));if(it){const f=it.getAsFile();if(f)loadFile(f)}});

  function loadFile(file){
    fileName=file.name.replace(/\.[^.]+$/,'')||'image';
    if(srcUrl)URL.revokeObjectURL(srcUrl);
    srcUrl=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      srcImg=img;
      aspect=img.naturalWidth/img.naturalHeight;
      outW.value=img.naturalWidth;
      outH.value=img.naturalHeight;
      crop=null;
      updateCropUI();
      exitCropMode();
      settings.classList.add('open');
      stage.classList.add('open');
      renderPreview();
      stage.scrollIntoView({behavior:'smooth',block:'start'});
    };
    img.onerror=()=>alert('画像の読み込みに失敗しました');
    img.src=srcUrl;
  }

  /* ---- 縦横比ロック ---- */
  lockBtn.addEventListener('click',()=>{
    locked=!locked;
    lockBtn.textContent=locked?'🔗':'↔️';
    lockBtn.classList.toggle('unlocked',!locked);
  });
  outW.addEventListener('input',()=>{if(locked&&srcImg){outH.value=Math.round(parseInt(outW.value,10)/aspect)||''}});
  outH.addEventListener('input',()=>{if(locked&&srcImg){outW.value=Math.round(parseInt(outH.value,10)*aspect)||''}});
  [outW,outH].forEach(el=>el.addEventListener('change',()=>{if(srcImg)renderPreview()}));

  /* ---- プリセット ---- */
  $('presets').addEventListener('click',e=>{
    const p=e.target.closest('.preset');
    if(!p)return;
    locked=false;lockBtn.textContent='↔️';lockBtn.classList.add('unlocked');
    outW.value=p.dataset.w;outH.value=p.dataset.h;
    if(srcImg)renderPreview();
  });

  /* ---- 設定UI ---- */
  fillColor.addEventListener('input',()=>fillColorHex.textContent=fillColor.value);
  jpegQual.addEventListener('input',()=>jpegQualVal.textContent=jpegQual.value);
  const syncUI=()=>{
    const isContain=fitMode.value==='contain';
    fillModeField.style.display=isContain?'':'none';
    colorField.style.display=(isContain&&fillMode.value==='color')?'':'none';
    jpegQualField.style.display=outFormat.value!=='image/png'?'':'none';
  };
  [fitMode,fillMode,outFormat].forEach(el=>el.addEventListener('change',()=>{syncUI();if(srcImg)renderPreview()}));
  [fillColor,jpegQual].forEach(el=>el.addEventListener('change',()=>{if(srcImg)renderPreview()}));
  syncUI();

  /* ---- 端の色 ---- */
  pickEdge.addEventListener('click',()=>{
    if(!srcImg)return;
    const c=document.createElement('canvas');
    c.width=srcImg.naturalWidth;c.height=srcImg.naturalHeight;
    const cx=c.getContext('2d');
    cx.drawImage(srcImg,0,0);
    const d=cx.getImageData(0,0,c.width,c.height).data;
    let r=0,g=0,b=0,n=0;
    const w=c.width,h=c.height;
    const s=(x,y)=>{const i=(y*w+x)*4;r+=d[i];g+=d[i+1];b+=d[i+2];n++};
    for(let x=0;x<w;x++){s(x,0);s(x,h-1)}
    for(let y=1;y<h-1;y++){s(0,y);s(w-1,y)}
    r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);
    const hex='#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
    fillColor.value=hex;fillColorHex.textContent=hex;
    renderPreview();
  });

  /* ================ クロップ編集 ================ */
  cropOpenBtn.addEventListener('click',enterCropMode);
  cropRemoveBtn.addEventListener('click',()=>{crop=null;updateCropUI();renderPreview()});
  cropCancelBtn.addEventListener('click',exitCropMode);
  cropClearBtn.addEventListener('click',()=>{crop=null;dragSel=null;drawCropCanvas();updateCropButtons()});
  cropConfirmBtn.addEventListener('click',()=>{exitCropMode();updateCropUI();renderPreview()});
  cropAspectLock.addEventListener('change',()=>{});

  function enterCropMode(){
    if(!srcImg)return;
    const tw=parseInt(outW.value,10)||0, th=parseInt(outH.value,10)||0;
    cropRatioText.textContent=(tw>0&&th>0)?`${tw}:${th}`:'?';
    cropStage.classList.add('open');
    settings.classList.remove('open');
    stage.classList.remove('open');
    cropCanvas.width=srcImg.naturalWidth;
    cropCanvas.height=srcImg.naturalHeight;
    drawCropCanvas();
    updateCropButtons();
    cropStage.scrollIntoView({behavior:'smooth',block:'start'});
  }
  function exitCropMode(){
    cropStage.classList.remove('open');
    if(srcImg){
      settings.classList.add('open');
      stage.classList.add('open');
    }
    dragStart=null;dragSel=null;
  }

  function drawCropCanvas(){
    if(!srcImg)return;
    cCtx.clearRect(0,0,cropCanvas.width,cropCanvas.height);
    cCtx.drawImage(srcImg,0,0);
    const sel=dragSel||crop;
    if(sel){
      cCtx.fillStyle='rgba(0,0,0,0.55)';
      cCtx.beginPath();
      cCtx.rect(0,0,cropCanvas.width,cropCanvas.height);
      cCtx.rect(sel.x,sel.y,sel.w,sel.h);
      cCtx.fill('evenodd');
      cCtx.strokeStyle='#7fb4a2';
      cCtx.lineWidth=Math.max(2,cropCanvas.width/400);
      cCtx.strokeRect(sel.x,sel.y,sel.w,sel.h);
    }
  }

  const toImgCoords=e=>{
    const rect=cropCanvas.getBoundingClientRect();
    const x=(e.clientX-rect.left)*(cropCanvas.width/rect.width);
    const y=(e.clientY-rect.top)*(cropCanvas.height/rect.height);
    return{
      x:Math.max(0,Math.min(cropCanvas.width,x)),
      y:Math.max(0,Math.min(cropCanvas.height,y)),
    };
  };

  const outAspect=()=>{
    const tw=parseInt(outW.value,10)||0, th=parseInt(outH.value,10)||0;
    return (tw>0&&th>0)?tw/th:null;
  };

  function buildSel(start,cur){
    let x0=start.x,y0=start.y;
    let w=cur.x-x0,h=cur.y-y0;
    const ar=cropAspectLock.checked?outAspect():null;
    if(ar){
      const aw=Math.abs(w),ah=Math.abs(h);
      if(aw/ar>=ah){h=Math.sign(h||1)*(aw/ar)}
      else{w=Math.sign(w||1)*(ah*ar)}
      const cw=cropCanvas.width,ch=cropCanvas.height;
      if(x0+w<0){w=-x0;h=Math.sign(h||1)*(Math.abs(w)/ar)}
      if(x0+w>cw){w=cw-x0;h=Math.sign(h||1)*(Math.abs(w)/ar)}
      if(y0+h<0){h=-y0;w=Math.sign(w||1)*(Math.abs(h)*ar)}
      if(y0+h>ch){h=ch-y0;w=Math.sign(w||1)*(Math.abs(h)*ar)}
    }
    return{
      x:w>=0?x0:x0+w,
      y:h>=0?y0:y0+h,
      w:Math.abs(w),
      h:Math.abs(h),
    };
  }

  cropCanvas.addEventListener('pointerdown',e=>{
    e.preventDefault();
    cropCanvas.setPointerCapture?.(e.pointerId);
    dragStart=toImgCoords(e);
    dragSel={x:dragStart.x,y:dragStart.y,w:0,h:0};
    drawCropCanvas();
  });
  cropCanvas.addEventListener('pointermove',e=>{
    if(!dragStart)return;
    e.preventDefault();
    dragSel=buildSel(dragStart,toImgCoords(e));
    drawCropCanvas();
  });
  const endDrag=e=>{
    if(!dragStart)return;
    e.preventDefault();
    const sel=buildSel(dragStart,toImgCoords(e));
    dragStart=null;dragSel=null;
    if(sel.w>4&&sel.h>4){
      crop={
        x:Math.round(sel.x),y:Math.round(sel.y),
        w:Math.round(sel.w),h:Math.round(sel.h),
      };
    }
    drawCropCanvas();
    updateCropButtons();
  };
  cropCanvas.addEventListener('pointerup',endDrag);
  cropCanvas.addEventListener('pointercancel',endDrag);

  function updateCropButtons(){
    cropConfirmBtn.disabled=!crop;
    cropInfo.textContent=crop?`${crop.w}×${crop.h}px を選択中`:'';
  }
  function updateCropUI(){
    if(crop){
      cropBadge.textContent=`${crop.w}×${crop.h}px を使用中`;
      cropBadge.style.display='';
      cropRemoveBtn.style.display='';
      cropOpenBtn.textContent='範囲を選び直す';
    }else{
      cropBadge.style.display='none';
      cropRemoveBtn.style.display='none';
      cropOpenBtn.textContent='範囲を選んで拡大';
    }
  }

  /* ================ プレビュー ================ */
  function renderPreview(){
    if(!srcImg)return;
    const tw=parseInt(outW.value,10)||srcImg.naturalWidth;
    const th=parseInt(outH.value,10)||srcImg.naturalHeight;
    previewCanvas.width=tw;previewCanvas.height=th;
    pCtx.clearRect(0,0,tw,th);
    pCtx.imageSmoothingQuality='high';

    const cx0=crop?crop.x:0, cy0=crop?crop.y:0;
    const sw=crop?crop.w:srcImg.naturalWidth;
    const sh=crop?crop.h:srcImg.naturalHeight;
    const drawSrc=(ctx,dx,dy,dw,dh)=>ctx.drawImage(srcImg,cx0,cy0,sw,sh,dx,dy,dw,dh);

    const mode=fitMode.value;
    if(mode==='stretch'){
      drawSrc(pCtx,0,0,tw,th);
    }else if(mode==='cover'){
      const scale=Math.max(tw/sw,th/sh);
      const dw=sw*scale,dh=sh*scale;
      drawSrc(pCtx,(tw-dw)/2,(th-dh)/2,dw,dh);
    }else{
      const scale=Math.min(tw/sw,th/sh);
      const dw=sw*scale,dh=sh*scale;
      const ox=(tw-dw)/2,oy=(th-dh)/2;
      const fill=fillMode.value;
      if(fill==='color'){
        pCtx.fillStyle=fillColor.value;
        pCtx.fillRect(0,0,tw,th);
      }else if(fill==='mirror'){
        const tmp=document.createElement('canvas');
        tmp.width=tw;tmp.height=th;
        const tc=tmp.getContext('2d');
        drawSrc(tc,ox,oy,dw,dh);
        if(ox>0){
          tc.save();tc.beginPath();tc.rect(0,oy,ox,dh);tc.clip();
          tc.translate(ox,0);tc.scale(-1,1);
          drawSrc(tc,0,oy,dw,dh);
          tc.restore();
        }
        if(ox+dw<tw){
          tc.save();tc.beginPath();tc.rect(ox+dw,oy,tw-ox-dw,dh);tc.clip();
          tc.translate(ox+dw,0);tc.scale(-1,1);tc.translate(-dw,0);
          drawSrc(tc,0,oy,dw,dh);
          tc.restore();
        }
        if(oy>0){
          tc.save();tc.beginPath();tc.rect(0,0,tw,oy);tc.clip();
          tc.translate(0,oy);tc.scale(1,-1);
          tc.drawImage(tmp,0,oy,tw,dh,0,0,tw,dh);
          tc.restore();
        }
        if(oy+dh<th){
          tc.save();tc.beginPath();tc.rect(0,oy+dh,tw,th-oy-dh);tc.clip();
          tc.translate(0,oy+dh);tc.scale(1,-1);tc.translate(0,-dh);
          tc.drawImage(tmp,0,oy,tw,dh,0,0,tw,dh);
          tc.restore();
        }
        pCtx.drawImage(tmp,0,0);
      }else if(fill==='blur'){
        pCtx.save();
        pCtx.filter='blur(40px)';
        const bs=Math.max(tw/sw,th/sh)*1.15;
        const bw=sw*bs,bh=sh*bs;
        drawSrc(pCtx,(tw-bw)/2,(th-bh)/2,bw,bh);
        pCtx.restore();
      }
      drawSrc(pCtx,ox,oy,dw,dh);
    }

    const zoomNote=(crop&&tw>0&&crop.w<tw)?'（拡大）':'';
    infoText.textContent=(crop?`切り抜き ${crop.w}×${crop.h}`:`${srcImg.naturalWidth}×${srcImg.naturalHeight}`)+` → ${tw}×${th}px ${zoomNote}`;
  }

  /* ---- 閉じる ---- */
  closeBtn.addEventListener('click',()=>{
    settings.classList.remove('open');
    stage.classList.remove('open');
    cropStage.classList.remove('open');
    srcImg=null;crop=null;
    if(srcUrl){URL.revokeObjectURL(srcUrl);srcUrl=null}
  });

  /* ---- 保存 ---- */
  saveBtn.addEventListener('click',()=>{
    const fmt=outFormat.value;
    const ext={['image/png']:'png',['image/jpeg']:'jpg',['image/webp']:'webp'}[fmt]||'png';
    const qual=fmt==='image/png'?undefined:parseFloat(jpegQual.value);
    let target=previewCanvas;
    if(fmt==='image/jpeg'){
      const c=document.createElement('canvas');
      c.width=previewCanvas.width;c.height=previewCanvas.height;
      const cx=c.getContext('2d');
      cx.fillStyle='#ffffff';
      cx.fillRect(0,0,c.width,c.height);
      cx.drawImage(previewCanvas,0,0);
      target=c;
    }
    target.toBlob(blob=>{
      if(!blob)return;
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=fileName+'-resized.'+ext;
      document.body.appendChild(a);a.click();a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    },fmt,qual);
  });
})();
</script>
</body>
