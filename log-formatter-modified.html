<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログ整形</title>
<style>
  :root{
    --paper:   #FAFAF7;
    --card:    #FFFFFF;
    --ink:     #363B37;
    --grey:    #868D87;
    --line:    #E0E5DF;
    --green:   #56755F;
    --green-d: #3E5847;
    --green-s: #ECF1EB;
    --radius:  14px;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }

  body{
    min-height:100vh;
    font-family:'Zen Kaku Gothic New','Noto Sans JP','Hiragino Sans',sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.8;
    letter-spacing:.02em;
    -webkit-font-smoothing:antialiased;
    padding:2.5rem 1.5rem;
  }

  button,input,textarea{ font:inherit; }
  .wrap{ max-width:680px; margin:0 auto; }

  h1{
    margin-bottom:2rem;
    color:var(--green-d);
    font-size:1.2rem;
    font-weight:600;
    letter-spacing:.08em;
  }

  .settings-card{
    margin-bottom:1.5rem;
    padding:1.25rem;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
  }

  .name-setting + .name-setting{
    margin-top:1.25rem;
    padding-top:1.25rem;
    border-top:1px solid var(--line);
  }

  .section-label{
    margin-bottom:.55rem;
    color:var(--grey);
    font-size:.76rem;
    font-weight:500;
    letter-spacing:.08em;
  }

  .name-row{
    display:flex;
    gap:.55rem;
    flex-wrap:wrap;
    align-items:center;
  }

  .name-btn{
    padding:.42rem 1rem;
    border:1px solid var(--line);
    border-radius:9px;
    background:var(--card);
    color:var(--grey);
    font-size:.82rem;
    cursor:pointer;
    transition:background .15s,border-color .15s,color .15s,transform .15s;
  }

  .name-btn:hover{
    border-color:var(--green);
    color:var(--green-d);
  }

  .name-btn:active{ transform:translateY(1px); }

  .name-btn.active{
    border-color:var(--green);
    background:var(--green-s);
    color:var(--green-d);
    font-weight:500;
  }

  .custom-input{
    width:9.5rem;
    padding:.42rem .75rem;
    border:1px solid var(--line);
    border-radius:9px;
    outline:none;
    background:var(--card);
    color:var(--ink);
    font-size:.82rem;
    transition:border-color .2s,box-shadow .2s;
  }

  .custom-input:focus,
  textarea:focus{
    border-color:var(--green);
    box-shadow:0 0 0 3px var(--green-s);
  }

  .custom-input::placeholder,
  textarea::placeholder{
    color:var(--grey);
    opacity:.7;
  }

  .or-label{
    margin:0 .1rem;
    color:var(--grey);
    font-size:.75rem;
  }

  textarea{
    width:100%;
    padding:1rem;
    border:1px solid var(--line);
    border-radius:var(--radius);
    outline:none;
    resize:vertical;
    background:var(--card);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New','Noto Sans JP','Hiragino Sans',sans-serif;
    font-size:.875rem;
    line-height:1.75;
    transition:border-color .2s,box-shadow .2s;
  }

  .action-btn{
    padding:.62rem 1.5rem;
    border:1px solid var(--green);
    border-radius:10px;
    background:var(--green);
    color:#fff;
    font-size:.875rem;
    cursor:pointer;
    letter-spacing:.03em;
    transition:background .15s,border-color .15s,transform .15s;
  }

  .action-btn:hover{
    border-color:var(--green-d);
    background:var(--green-d);
  }

  .action-btn:active{ transform:translateY(1px); }

  .action-btn.small{
    padding:.36rem 1rem;
    background:var(--green-s);
    color:var(--green-d);
  }

  .action-btn.small:hover{
    background:var(--green);
    color:#fff;
  }

  .actions{
    display:flex;
    gap:.75rem;
    margin:1.25rem 0 2rem;
  }

  .output-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:.55rem;
  }

  .output-header .section-label{ margin-bottom:0; }
  #output-section{ display:none; }

  @media (max-width:480px){
    body{ padding:1.75rem 1rem; }
    .settings-card{ padding:1rem; }
    .custom-input{ flex:1 1 9rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>ログ整形</h1>

  <div class="settings-card">
    <div class="name-setting" data-speaker="assistant">
      <div class="section-label">Assistant の置き換え名</div>
      <div class="name-row">
        <button type="button" class="name-btn active" data-name="Claude">Claude</button>
        <button type="button" class="name-btn" data-name="パートナー">パートナー</button>
        <span class="or-label">または</span>
        <input type="text" class="custom-input" id="assistant-custom-name" placeholder="自由設定">
      </div>
    </div>

    <div class="name-setting" data-speaker="user">
      <div class="section-label">User の置き換え名</div>
      <div class="name-row">
        <button type="button" class="name-btn active" data-name="ユーザー">ユーザー</button>
        <span class="or-label">または</span>
        <input type="text" class="custom-input" id="user-custom-name" placeholder="自由設定">
      </div>
    </div>
  </div>

  <div>
    <div class="section-label">ログを貼り付け</div>
    <textarea id="input" rows="10" placeholder="User:&#10;7/7/2026 1:21:18&#10;テキストをここに……"></textarea>
  </div>

  <div class="actions">
    <button type="button" class="action-btn" id="format-btn">整形する</button>
  </div>

  <div id="output-section">
    <div class="output-header">
      <div class="section-label">出力</div>
      <button type="button" class="action-btn small" id="copy-btn">コピー</button>
    </div>
    <textarea id="output" rows="12" readonly style="cursor:default"></textarea>
  </div>
</div>

<script>
(function(){
  const DATE_RE = /^\d{1,2}\/\d{1,2}\/\d{4}\s+\d{1,2}:\d{2}:\d{2}\s*$/;

  const nameSettings = {
    assistant: createNameSetting('assistant', 'Claude'),
    user: createNameSetting('user', 'ユーザー')
  };

  const inputEl = document.getElementById('input');
  const outputEl = document.getElementById('output');
  const outputSection = document.getElementById('output-section');
  const formatBtn = document.getElementById('format-btn');
  const copyBtn = document.getElementById('copy-btn');

  function createNameSetting(speaker, defaultName){
    const settingEl = document.querySelector(`[data-speaker="${speaker}"]`);
    const presetBtns = settingEl.querySelectorAll('.name-btn');
    const customInput = settingEl.querySelector('.custom-input');
    let selectedName = defaultName;
    let useCustom = false;

    presetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        useCustom = false;
        selectedName = btn.dataset.name;
        presetBtns.forEach(item => item.classList.remove('active'));
        btn.classList.add('active');
        customInput.value = '';
      });
    });

    customInput.addEventListener('input', () => {
      useCustom = Boolean(customInput.value.trim());
      presetBtns.forEach(item => item.classList.toggle('active', !useCustom && item.dataset.name === selectedName));
    });

    customInput.addEventListener('focus', () => {
      if(customInput.value.trim()){
        useCustom = true;
        presetBtns.forEach(item => item.classList.remove('active'));
      }
    });

    return {
      getName(){
        return useCustom && customInput.value.trim()
          ? customInput.value.trim()
          : selectedName;
      }
    };
  }

  function formatLog(text, userName, assistantName){
    return text.split('\n').reduce((result, line) => {
      const trimmed = line.trim();
      if(DATE_RE.test(trimmed)) return result;
      if(trimmed === 'User:') result.push(userName + '：');
      else if(trimmed === 'Assistant:') result.push(assistantName + '：');
      else result.push(line);
      return result;
    }, []).join('\n');
  }

  formatBtn.addEventListener('click', () => {
    const raw = inputEl.value;
    if(!raw.trim()) return;

    outputEl.value = formatLog(
      raw,
      nameSettings.user.getName(),
      nameSettings.assistant.getName()
    );
    outputSection.style.display = 'block';
  });

  copyBtn.addEventListener('click', async () => {
    if(!outputEl.value) return;

    try{
      await navigator.clipboard.writeText(outputEl.value);
    }catch(error){
      outputEl.select();
      document.execCommand('copy');
      window.getSelection()?.removeAllRanges();
    }

    copyBtn.textContent = '✓ コピーした';
    setTimeout(() => { copyBtn.textContent = 'コピー'; }, 2000);
  });
})();
</script>
</body>
</html>
